name: Go Unit Tests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests (non-blocking)
        id: unit_tests
        continue-on-error: true
        run: go test ./...

      - name: Report test failure without failing workflow
        if: steps.unit_tests.outcome == 'failure'
        run: |
          echo "::warning::go test failed. This workflow is non-blocking by design."
